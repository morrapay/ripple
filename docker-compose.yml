services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pmuser
      POSTGRES_PASSWORD: pmpass
      POSTGRES_DB: pm_internal_tool
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmuser -d pm_internal_tool"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://pmuser:pmpass@postgres:5432/pm_internal_tool"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-dev-secret}"
      NEXTAUTH_URL: "http://localhost:3005"
      FRONTEND_URL: "http://localhost:5173"
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: "http://localhost:3005"

volumes:
  postgres_data:
